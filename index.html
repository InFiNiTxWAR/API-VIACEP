<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Consulta ViaCEP</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f4f4;
        }

        .card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body>


    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Consulta ViaCEP</a>

            <div class="navbar-nav ms-auto">
                <button class="btn btn-light me-2" onclick="mostrarBuscaCEP()">
                    Buscar por CEP
                </button>

                <button class="btn btn-outline-light" onclick="mostrarBuscaRua()">
                    Buscar por Rua\
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <div id="buscaCEP">

            <h2 class="mb-4">Consultar por CEP</h2>

            <div class="row">
                <div class="col-md-6">
                    <input type="text" id="cep" class="form-control" placeholder="Digite o CEP">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="consultarCEP()">
                        Consultar
                    </button>
                </div>
            </div>
        </div>

        <div id="buscaRua" class="d-none">

            <h2 class="mb-4">Consultar por Rua</h2>

            <div class="row g-3">

                <div class="col-md-4">
                    <input type="text" id="uf" class="form-control" placeholder="UF">
                </div>

                <div class="col-md-4">
                    <input type="text" id="cidade" class="form-control" placeholder="Cidade">
                </div>

                <div class="col-md-4">
                    <input type="text" id="rua" class="form-control" placeholder="Rua">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-success w-100" onclick="consultarRua()">
                        Consultar
                    </button>
                </div>

            </div>
        </div>

        <div id="resultado" class="mt-5"></div>

    </div>

    <script>

const resultado = document.getElementById("resultado");

function mostrarBuscaCEP() {
    document.getElementById("buscaCEP").classList.remove("d-none");
    document.getElementById("buscaRua").classList.add("d-none");

    resultado.innerHTML = "";
}

function mostrarBuscaRua() {
    document.getElementById("buscaRua").classList.remove("d-none");
    document.getElementById("buscaCEP").classList.add("d-none");

    resultado.innerHTML = "";
}

async function consultarCEP() {
    const cep = document.getElementById("cep").value;

    const endpoint = `https://viacep.com.br/ws/${cep}/json/`;

    try {
        const response = await fetch(endpoint);
        const data = await response.json();

        if (data.erro) {
            resultado.innerHTML = `
                <div class="alert alert-danger">
                    CEP não encontrado
                </div>
            `;
            return;
        }

        mostrarCard(data);

    } catch (error) {
        resultado.innerHTML = `
            <div class="alert alert-danger">
                Erro ao consultar API
            </div>
        `;
    }
}

async function consultarRua() {
    const uf = document.getElementById("uf").value;
    const cidade = document.getElementById("cidade").value;
    const rua = document.getElementById("rua").value;

    const endpoint = `https://viacep.com.br/ws/${uf}/${cidade}/${rua}/json/`;

    try {
        const response = await fetch(endpoint);
        const data = await response.json();

        if (data.length === 0) {
            resultado.innerHTML = `
                <div class="alert alert-danger">
                    Rua não encontrada
                </div>
            `;
            return;
        }

        resultado.innerHTML = "";

        data.forEach(endereco => {
            resultado.innerHTML += `
                <div class="card p-3 mb-3">
                    <h4>${endereco.logradouro}</h4>
                    <p><strong>Bairro:</strong> ${endereco.bairro}</p>
                    <p><strong>Cidade:</strong> ${endereco.localidade}</p>
                    <p><strong>UF:</strong> ${endereco.uf}</p>
                    <p><strong>CEP:</strong> ${endereco.cep}</p>
                </div>
            `;
        });

    } catch (error) {
        resultado.innerHTML = `
            <div class="alert alert-danger">
                Erro ao consultar API
            </div>
        `;
    }
}

function mostrarCard(data) {
    resultado.innerHTML = `
        <div class="card p-4">
            <h3 class="mb-3">${data.logradouro}</h3>

            <p><strong>CEP:</strong> ${data.cep}</p>
            <p><strong>Bairro:</strong> ${data.bairro}</p>
            <p><strong>Cidade:</strong> ${data.localidade}</p>
            <p><strong>UF:</strong> ${data.uf}</p>
            <p><strong>Estado:</strong> ${data.estado}</p>
            <p><strong>Região:</strong> ${data.regiao}</p>
            <p><strong>DDD:</strong> ${data.ddd}</p>
            <p><strong>IBGE:</strong> ${data.ibge}</p>
        </div>
    `;
}




    </script>

</body>

</html>
